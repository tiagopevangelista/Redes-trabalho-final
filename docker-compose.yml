version: '3.8'

services:
  sender:
    image: gcc:latest
    volumes:
      - .:/app
    working_dir: /app
    command: bash -c "gcc host.c -o host && sleep 5 && ./host send 10.0.0.3 10.0.0.4"
    networks:
      sim_net:
        ipv4_address: 10.0.0.2

  router:
    image: gcc:latest
    volumes:
      - .:/app
    working_dir: /app
    command: bash -c "gcc router.c -o router && ./router"
    networks:
      sim_net:
        ipv4_address: 10.0.0.3

  receiver:
    image: gcc:latest
    volumes:
      - .:/app
    working_dir: /app
    command: bash -c "gcc host.c -o host && ./host receive"
    networks:
      sim_net:
        ipv4_address: 10.0.0.4

networks:
  sim_net:
    ipam:
      config:
        - subnet: 10.0.0.0/24
